# Ejecuta el bot todos los dias habiles a las 22:45 UTC
# (despues del cierre del mercado de EE.UU.) y guarda data.json
name: Bot diario

on:
  schedule:
    - cron: "45 22 * * 1-5"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        run: python bot/actualizar.py

      - name: Guardar data.json
        run: |
          git config user.name "bot-diario"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Actualizacion diaria del bot"
          git push
