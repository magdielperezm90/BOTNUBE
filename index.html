<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cazador SMC</title>
<meta name="description" content="Bot de trading simulado: Smart Money Concepts sobre 20 tickers">
<meta name="theme-color" content="#0B1018">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1018; --card:#131B29; --line:#22304A; --text:#E7ECF4; --muted:#8A97AB;
    --gold:#E8B84B; --up:#3DDC97; --down:#FF6B7A; --violeta:#B48CFF;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Sora',system-ui,sans-serif;
    padding:16px 14px calc(28px + env(safe-area-inset-bottom));
    max-width:680px; margin:0 auto;
  }
  .num{font-family:'IBM Plex Mono',ui-monospace,monospace; font-variant-numeric:tabular-nums}
  header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px}
  .eyebrow{color:var(--muted); font-size:11px; letter-spacing:.14em; text-transform:uppercase}
  h1{font-size:20px; font-weight:700; margin-top:2px}
  .precio-box{text-align:right}
  .precio{font-size:22px; font-weight:600}
  .actualizado{color:var(--muted); font-size:11px; margin-top:2px}
  .aviso{background:var(--card); border:1px dashed var(--line); border-radius:var(--radius);
    padding:18px; color:var(--muted); font-size:14px; line-height:1.5; margin-bottom:14px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px}
  .card h2{font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px}
  .card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .fila-valor{display:flex; justify-content:space-between; align-items:baseline; margin:10px 0 4px}
  .valor{font-size:28px; font-weight:600}
  .badge{font-size:11px; font-weight:600; letter-spacing:.08em; padding:4px 10px;
    border-radius:99px; border:1px solid var(--line); color:var(--muted)}
  .badge.dentro{color:var(--violeta); border-color:rgba(180,140,255,.4); background:rgba(180,140,255,.08)}
  .rend{font-size:13px; margin-bottom:12px}
  .pos{color:var(--up)} .neg{color:var(--down)}
  .contexto{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5}
  .contexto b{color:var(--text)}
  .riel-titulo{display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px}
  .riel{position:relative; height:34px; margin-bottom:4px}
  .riel .via{position:absolute; top:15px; left:0; right:0; height:4px; border-radius:2px;
    background:linear-gradient(90deg, rgba(255,107,122,.55), rgba(255,107,122,.15) 46%, rgba(138,151,171,.6) 50%, rgba(61,220,151,.15) 54%, rgba(61,220,151,.55))}
  .riel .cero{position:absolute; top:6px; left:50%; width:2px; height:22px; background:var(--muted); transform:translateX(-1px); border-radius:1px}
  .riel .marcador{position:absolute; top:10px; width:14px; height:14px; border-radius:50%;
    background:var(--text); border:3px solid var(--bg); transform:translateX(-7px);
    box-shadow:0 0 0 1px var(--line)}
  .riel-leyenda{display:flex; justify-content:space-between; font-size:10px; color:var(--muted)}
  .margen-texto{text-align:center; font-size:12px; color:var(--muted); margin-top:8px}
  .margen-texto b{color:var(--text)}
  canvas{width:100%; height:190px; display:block}
  .leyenda{display:flex; gap:14px; font-size:11px; color:var(--muted); margin-top:8px; flex-wrap:wrap}
  .leyenda i{display:inline-block; width:10px; height:3px; border-radius:2px; margin-right:5px; vertical-align:middle}
  table{width:100%; border-collapse:collapse; font-size:12px}
  th{color:var(--muted); font-weight:500; text-align:left; padding:6px 4px; border-bottom:1px solid var(--line); font-size:11px}
  td{padding:7px 4px; border-bottom:1px solid rgba(34,48,74,.5)}
  td.der, th.der{text-align:right}
  .op-compra{color:var(--up)} .op-venta{color:var(--down)}
  .sin-ops{color:var(--muted); font-size:13px; padding:10px 0}
  .boton{display:block; width:100%; padding:12px; margin-top:4px;
    background:transparent; color:var(--violeta); border:1px solid rgba(180,140,255,.4);
    border-radius:var(--radius); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer}
  .boton:active{background:rgba(180,140,255,.1)}
  footer{margin-top:16px; text-align:center; color:var(--muted); font-size:11px; line-height:1.6}
  @media (prefers-reduced-motion:no-preference){
    .card{animation:entrar .35s ease both}
    @keyframes entrar{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Simulado &middot; Smart Money</div>
    <h1>Cazador SMC</h1>
  </div>
  <div class="precio-box">
    <div class="precio num" id="precio">&mdash;</div>
    <div class="actualizado" id="actualizado">cargando&hellip;</div>
  </div>
</header>

<div id="contenido"></div>

<button class="boton" id="refrescar">Actualizar datos</button>
<a href="academia.html" class="boton" style="text-decoration:none;text-align:center;color:var(--muted);border-color:var(--line);margin-top:10px;display:block">&#x1F393; Academia de Trading</a>

<footer>
  Cartera simulada &middot; No es dinero real ni consejo financiero.<br>
  CHoCH alcista + bias SMA200 &middot; 20 tickers &middot; m&aacute;x. 5 posiciones &middot; vs comprar y mantener QQQ
</footer>

<script>
const $ = s => document.querySelector(s);
const dinero = v => '$' + Number(v).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
const pctTxt = v => (v>=0?'+':'') + v.toFixed(2) + '%';

function cartaSMC(d){
  const i = d.indicadores;
  const smc = d.smc;
  const tks = Object.keys(smc.posiciones || {});
  const p = (i.valor_smc / d.capital_inicial - 1) * 100;
  const filas = tks.map(tk=>{
    const pos = smc.posiciones[tk];
    const actual = pos.precio_actual || pos.entrada;
    const pnl = (actual / pos.entrada - 1) * 100;
    return `<tr>
      <td><b>${tk}</b></td>
      <td class="num">${pos.fecha}</td>
      <td class="der num">${dinero(pos.entrada)}</td>
      <td class="der num">${dinero(actual)}</td>
      <td class="der num ${pnl>=0?'pos':'neg'}">${pctTxt(pnl)}</td>
    </tr>`;
  }).join('');
  return `
  <div class="card" style="border-color:rgba(180,140,255,.3)">
    <h2><span class="dot" style="background:var(--violeta)"></span>Cartera del Cazador</h2>
    <div class="fila-valor">
      <div class="valor num">${dinero(i.valor_smc)}</div>
      <div class="badge ${tks.length? 'dentro':''}">${tks.length}/5 POSICIONES</div>
    </div>
    <div class="rend"><span class="num ${p>=0?'pos':'neg'}">${pctTxt(p)}</span> desde el inicio &middot; vs QQQ: <span class="num">${dinero(i.valor_bh)}</span></div>
    ${tks.length ? `<div style="overflow-x:auto"><table>
      <tr><th>Posici&oacute;n</th><th>Desde</th><th class="der">Entrada</th><th class="der">Actual</th><th class="der">P&amp;L</th></tr>
      ${filas}</table></div>`
    : '<div class="sin-ops">Sin posiciones: esperando un CHoCH alcista con bias a favor en la lista de 20.</div>'}
    <div class="contexto">Estructura del mercado hoy: <b>${i.tickers_alcistas} de ${i.tickers_total}</b> tickers en estructura alcista (CHoCH vigente sobre su SMA200).</div>
  </div>`;
}

function cartaImpulso(d){
  const roc = d.indicadores.roc10;
  if (typeof roc !== 'number') return '';
  const pos = Math.max(-10, Math.min(10, roc));
  const x = ((pos + 10) / 20 * 100).toFixed(2);
  let lectura;
  if (roc >= 5)       lectura = 'Impulso <b>fuerte alcista</b>: el mercado sube con velocidad inusual.';
  else if (roc >= 2)  lectura = 'Impulso <b>alcista</b>: el mercado empuja con fuerza moderada.';
  else if (roc > -2)  lectura = 'Impulso <b>neutro</b>: sin direcci&oacute;n clara estas dos semanas.';
  else if (roc > -5)  lectura = 'Impulso <b>bajista</b>: presi&oacute;n vendedora moderada.';
  else                lectura = 'Impulso <b>fuerte bajista</b>: ca&iacute;da r&aacute;pida en curso.';
  return `
  <div class="card">
    <h2><span class="dot" style="background:var(--text)"></span>Impulso del mercado</h2>
    <div class="riel-titulo" style="margin-top:12px"><span>ROC 10 d&iacute;as de QQQ</span><span class="num">${pctTxt(roc)}</span></div>
    <div class="riel">
      <div class="via"></div><div class="cero"></div>
      <div class="marcador" style="left:${x}%"></div>
    </div>
    <div class="riel-leyenda"><span>&minus;10% fuerte bajista</span><span>0%</span><span>+10% fuerte alcista</span></div>
    <div class="margen-texto">${lectura}</div>
  </div>`;
}

function cartaGrafico(d){
  return `
  <div class="card">
    <h2><span class="dot" style="background:var(--muted)"></span>Cazador SMC vs comprar y mantener</h2>
    <div style="margin-top:12px"><canvas id="grafico"></canvas></div>
    <div class="leyenda">
      <span><i style="background:var(--violeta)"></i>Cazador SMC</span>
      <span><i style="background:var(--muted)"></i>Comprar y mantener QQQ</span>
    </div>
  </div>`;
}

function dibujarGrafico(hist){
  const cv = $('#grafico'); if(!cv || hist.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = 190;
  cv.width = W * dpr; cv.height = H * dpr;
  const ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);

  const series = [
    {k:'smc', color:'#B48CFF', w:2.2},
    {k:'bh',  color:'#8A97AB', w:1.4},
  ].filter(s => hist.some(h => typeof h[s.k] === 'number'));
  const todos = hist.flatMap(h => series.map(s => h[s.k]).filter(v => typeof v === 'number'));
  let min = Math.min(...todos), max = Math.max(...todos);
  if(max - min < 1){ min -= 1; max += 1; }
  const pad = (max - min) * 0.08; min -= pad; max += pad;
  const px = i => 4 + (W-8) * i / (hist.length - 1);
  const py = v => H - 18 - (H-30) * (v - min) / (max - min);

  ctx.strokeStyle = 'rgba(34,48,74,.6)'; ctx.lineWidth = 1;
  ctx.fillStyle = '#8A97AB'; ctx.font = '10px IBM Plex Mono, monospace';
  [min+pad, (min+max)/2, max-pad].forEach(v=>{
    const y = py(v);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    ctx.fillText('$'+Math.round(v).toLocaleString('en-US'), 4, y-3);
  });
  series.forEach(s=>{
    ctx.strokeStyle = s.color; ctx.lineWidth = s.w; ctx.lineJoin = 'round';
    ctx.beginPath();
    let ini = false;
    hist.forEach((h,i)=>{
      const v = h[s.k];
      if (typeof v !== 'number') return;
      const x=px(i), y=py(v);
      if (ini) ctx.lineTo(x,y); else { ctx.moveTo(x,y); ini = true; }
    });
    ctx.stroke();
  });
  ctx.fillStyle = '#8A97AB';
  ctx.fillText(hist[0].fecha, 4, H-4);
  const f = hist[hist.length-1].fecha;
  ctx.fillText(f, W - ctx.measureText(f).width - 4, H-4);
}

function cartaOps(d){
  const ops = (d.smc.operaciones || []).slice(0, 15);
  const filas = ops.map(o => `
    <tr>
      <td class="num">${o.fecha}</td>
      <td><b>${o.ticker}</b></td>
      <td class="${o.tipo.startsWith('COMPRA')?'op-compra':'op-venta'}">${o.tipo.startsWith('COMPRA')?'Compra':'Venta'}</td>
      <td class="der num">${dinero(o.precio)}</td>
      <td class="der num">${o.pnl === '' ? '&mdash;' : `<span class="${o.pnl>=0?'pos':'neg'}">${o.pnl>=0?'+':''}${Number(o.pnl).toFixed(2)}</span>`}</td>
    </tr>`).join('');
  return `
  <div class="card">
    <h2><span class="dot" style="background:var(--muted)"></span>Cacer&iacute;as</h2>
    ${ops.length ? `<div style="margin-top:10px; overflow-x:auto"><table>
      <tr><th>Fecha</th><th>Ticker</th><th>Tipo</th><th class="der">Precio</th><th class="der">P&amp;L ($)</th></tr>
      ${filas}</table></div>`
    : '<div class="sin-ops">Sin cacer&iacute;as todav&iacute;a. El primer CHoCH alcista aparecer&aacute; solo.</div>'}
  </div>`;
}

async function cargar(){
  try{
    const r = await fetch('data.json?t=' + Date.now(), {cache:'no-store'});
    const d = await r.json();
    if(!d.actualizado || d.version < 3){
      $('#contenido').innerHTML = '<div class="aviso">Esperando la primera actualizaci&oacute;n del Cazador SMC. Lanza el workflow desde la pesta&ntilde;a Actions de GitHub o espera a la corrida diaria.</div>';
      return;
    }
    $('#precio').textContent = 'QQQ ' + dinero(d.precio_qqq);
    $('#actualizado').textContent = 'vela ' + d.ultima_vela + ' \u00b7 ' + d.actualizado;
    $('#contenido').innerHTML = cartaSMC(d) + cartaImpulso(d) + cartaGrafico(d) + cartaOps(d);
    dibujarGrafico(d.historial);
  }catch(e){
    $('#contenido').innerHTML = '<div class="aviso">No se pudieron cargar los datos. Revisa tu conexi&oacute;n e intenta de nuevo.</div>';
  }
}

$('#refrescar').addEventListener('click', cargar);
cargar();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
